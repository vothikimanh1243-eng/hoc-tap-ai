<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị Bài Mô Phỏng</title>
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #131b2e;
            --accent-purple: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 30px; display: flex; justify-content: center; }
        .box { background: var(--bg-secondary); padding: 25px; border-radius: 12px; max-width: 600px; width: 100%; border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 15px; font-size: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 12px; border-radius: 6px; border: 1px solid var(--border-color); background: #1e293b; color: #fff; outline: none; font-size: 14px; }
        button { background: var(--accent-purple); font-weight: bold; cursor: pointer; }
        button:hover { background: var(--accent-hover); }
        .back-link { display: inline-block; margin-top: 20px; color: var(--text-muted); text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🚀 Trang Quản Trị Bài Mô Phỏng</h2>
        <p style="color: var(--text-muted); font-size: 14px;">Quản lý và thêm mới bài học vào danh sách.</p>
        
        <div style="margin-top: 20px;">
            <label>Tên bài mô phỏng:</label>
            <input type="text" id="simName" placeholder="Ví dụ: Vật Lý - Con Lắc Đơn">
            
            <label style="margin-top: 12px; display: block;">Đường dẫn (Link):</label>
            <input type="text" id="simLink" placeholder="Ví dụ: vat-ly.html">
            
            <button onclick="alert('Đã lưu thông tin bài học thành công!')">Lưu bài học</button>
        </div>

        <a href="index.html" class="back-link">← Quay lại trang chủ học sinh</a>
    </div>
</body>
</html>
