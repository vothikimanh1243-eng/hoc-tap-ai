<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Tập & Mô Phỏng AI</title>
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #131b2e;
            --accent-purple: #8b5cf6;
            --accent-hover: #7c3aed;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-main); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; margin-top: 20px; }
        h1 { margin-bottom: 20px; font-size: 24px; text-align: center; }
        
        /* Danh sách bài học */
        .sim-card { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .sim-info h3 { font-size: 18px; margin-bottom: 5px; }
        .sim-info p { color: var(--text-muted); font-size: 14px; }
        .btn-access { background: var(--accent-purple); color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 14px; }
        .btn-access:hover { background: var(--accent-hover); }

        /* Khung chat */
        .chat-box { background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 12px; margin-top: 30px; display: flex; flex-direction: column; height: 400px; overflow: hidden; }
        .chat-header { background: #1e293b; padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border-color); }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 14px; border-radius: 8px; max-width: 75%; font-size: 14px; line-height: 1.4; }
        .message.bot { background: #1e293b; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.user { background: var(--accent-purple); align-self: flex-end; border-bottom-right-radius: 2px; }
        .chat-input-area { display: flex; padding: 12px; border-top: 1px solid var(--border-color); background: #1e293b; }
        .chat-input-area input { flex: 1; background: var(--bg-primary); border: 1px solid var(--border-color); padding: 10px; border-radius: 6px; color: white; outline: none; }
        .chat-input-area button { background: var(--accent-purple); color: white; border: none; padding: 0 20px; margin-left: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .chat-input-area button:hover { background: var(--accent-hover); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚀 Danh Sách Bài Mô Phỏng</h1>
        <div id="simListContainer">
            <!-- Dữ liệu bài học sẽ tự động nạp từ Admin -->
        </div>

        <div class="chat-box">
            <div class="chat-header">🤖 Trợ Lý AI Học Tập Trực Tuyến</div>
            <div class="chat-messages" id="chatMessages">
                <div class="message bot">Xin chào! Mình là trợ lý AI. Bạn cần hỗ trợ gì về các bài mô phỏng trên trang web không?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Nhập câu hỏi cho AI..." onkeypress="handleKeyPress(event)">
                <button onclick="sendMessage()">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        // Tải danh sách bài học từ localStorage (Đồng bộ với trang Admin)
        function loadSimulations() {
            let defaultSims = [
                { title: "Hệ mặt trời", desc: "Mô phỏng hệ mặt trời 3D", url: "#" },
                { title: "Hóa Học", desc: "Thí nghiệm hóa học ảo", url: "#" }
            ];
            let sims = JSON.parse(localStorage.getItem('saved_simulations')) || defaultSims;
            const container = document.getElementById('simListContainer');
            container.innerHTML = "";
            sims.forEach(sim => {
                container.innerHTML += `
                    <div class="sim-card">
                        <div class="sim-info">
                            <h3>${sim.title}</h3>
                            <p>${sim.desc}</p>
                        </div>
                        <a href="${sim.url}" class="btn-access">Truy cập ngay</a>
                    </div>
                `;
            });
        }
        loadSimulations();

        // Xử lý gửi tin nhắn Chat AI
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const messages = document.getElementById('chatMessages');
            const text = input.value.trim();
            if (!text) return;

            messages.innerHTML += `<div class="message user">${text}</div>`;
            input.value = "";
            messages.scrollTop = messages.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            messages.innerHTML += `<div class="message bot" id="${loadingId}">AI đang suy nghĩ...</div>`;
            messages.scrollTop = messages.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                document.getElementById(loadingId).innerText = data.reply || data.error;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Có lỗi từ máy chủ AI.";
            }
            messages.scrollTop = messages.scrollHeight;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') sendMessage();
        }
        // Phím tắt mở nhanh bảng quản trị Admin trên trang chủ
window.addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.shiftKey && e.key === 'A') {
        const pass = prompt("Nhập mật khẩu quản trị:");
        if (pass === "682010@") { // Thay "123" bằng mật khẩu bạn muốn
            alert("Đã đăng nhập quyền Admin thành công!");
            // Thêm logic mở form thêm/xóa bài mô phỏng tại đây
        } else if (pass !== null) {
            alert("Sai mật khẩu!");
        }
    }
});
    </script>
    <a href="admin.html" style="position: fixed; bottom: 10px; right: 10px; color: #94a3b8; font-size: 12px; text-decoration: none; background: #131b2e; padding: 6px 12px; border-radius: 6px; border: 1px solid #334155;">⚙️ Quản Trị</a>
</body>
</html>
